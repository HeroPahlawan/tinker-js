apiVersion: apps/v1
kind: Deployment
metadata:
  name: inshopper-api
  namespace: production
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: inshopper-api
  template:
    metadata:
      labels:
        app: inshopper-api
      annotations:
        eks.amazonaws.com/security-groups: sg-0c68d65790df0389d
    spec:
      containers:
        - name: inshopper-api
          image: 851725647704.dkr.ecr.ap-southeast-3.amazonaws.com/inshopper_api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
          resources:
            requests:
              cpu: "25m"
              memory: "100Mi"
            limits:
              cpu: "256m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 15
            successThreshold: 1
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 15
            successThreshold: 1
            failureThreshold: 3
          env:
            - name: VERSION
              value: "1.1.4"
---
apiVersion: v1
kind: Service
metadata:
  name: inshopper-api
  namespace: production
spec:
  type: ClusterIP
  ports:
    - port: 3001
      targetPort: 3001
  selector:
    app: inshopper-api
---
apiVersion: elbv2.k8s.aws/v1beta1
kind: TargetGroupBinding
metadata:
  name: inshopper-api
  namespace: production
spec:
  ipAddressType: ipv4
  serviceRef:
    name: inshopper-api
    port: 3001
  targetGroupARN: arn:aws:elasticloadbalancing:ap-southeast-3:851725647704:targetgroup/EKS-InShopper-API/e33f17cc8c6e2453
  targetType: ip